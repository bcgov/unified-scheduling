name: Publish Web

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "docker/web/**"
      - "docker/nginx-runtime/**"
      - "docker/vue-on-nginx/**"
      - ".github/workflows/publish-web.yml"
      - ".github/actions/update-argo-kustomize/**"

  workflow_dispatch:

env:
  WEB_IMAGE_NAME: web
  GITHUB_IMAGE_REPO: ghcr.io/bcgov/unified-scheduling
  WEB_BASE_HREF: /unified-scheduling/

permissions:
  packages: write

jobs:
  build:
    name: Build and Push Web Image
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.short_sha.outputs.SHORT_SHA }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Log in to the GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: short_sha
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0
        with:
          driver: docker

      - name: Setup Web Image Metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf #v6.0.0
        with:
          images: |
            ${{ env.GITHUB_IMAGE_REPO }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.short_sha.outputs.SHORT_SHA }}

      - name: Build and Push Web Image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #v7.1.0
        with:
          push: true
          context: .
          file: ./docker/web/Dockerfile.release
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=22
            WEB_BASE_HREF=${{ env.WEB_BASE_HREF }}
            NGINX_RUNTIME_SRC=./docker/nginx-runtime
            VUE_ON_NGINX_SRC=./docker/vue-on-nginx
            WEB_SRC=./web

  update-gitops-dev:
    name: Update GitOps Dev (${{ matrix.license_plate }})
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ matrix.license_plate }}
    strategy:
      matrix:
        license_plate: ${{ fromJson(vars.GITOPS_LICENSE_PLATES) }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Update Argo CD Kustomize
        uses: ./.github/actions/update-argo-kustomize
        with:
          licence_plate: ${{ matrix.license_plate }}
          gitops_branch: develop
          gitops_gh_token: ${{ secrets.GITOPS_DEPLOY_TOKEN }}
          image_name: unified-scheduling-web
          new_image: ${{ env.GITHUB_IMAGE_REPO }}/${{ env.WEB_IMAGE_NAME }}:${{ needs.build.outputs.short_sha }}
          kustomize_path: services/unified-scheduling
