name: Publish Web

on:
  push:
    branches:
      - main
    paths:
      - "web/**"
      - "docker/web/**"
      - "docker/nginx-runtime/**"
      - "docker/vue-on-nginx/**"
      - ".github/workflows/publish-web.yml"
      - ".github/actions/update-argo-kustomize/**"

  workflow_dispatch:

env:
  WEB_IMAGE_NAME: web
  GITHUB_IMAGE_REPO: ghcr.io/bcgov/unified-scheduling
  WEB_BASE_HREF: /unified-scheduling/

permissions:
  packages: write

jobs:
  build:
    name: Build and Push Web Image
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.short_sha.outputs.SHORT_SHA }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Log in to the GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: short_sha
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v4.1.0
        with:
          driver: docker

      - name: Setup Web Image Metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 #v6.1.0
        with:
          images: |
            ${{ env.GITHUB_IMAGE_REPO }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.short_sha.outputs.SHORT_SHA }}

      - name: Build and Push Web Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf #v7.2.0
        with:
          push: true
          context: .
          file: ./docker/web/Dockerfile.release
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_VERSION=22
            WEB_BASE_HREF=${{ env.WEB_BASE_HREF }}
            NGINX_RUNTIME_SRC=./docker/nginx-runtime
            VUE_ON_NGINX_SRC=./docker/vue-on-nginx
            WEB_SRC=./web

  update-gitops-dev:
    name: Update GitOps Dev (${{ matrix.license_plate }})
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ matrix.license_plate }}
    strategy:
      fail-fast: false
      matrix:
        license_plate: ${{ fromJson(vars.GITOPS_LICENSE_PLATES) }}
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Update Argo CD Kustomize
        uses: ./.github/actions/update-argo-kustomize
        with:
          licence_plate: ${{ matrix.license_plate }}
          gitops_branch: develop
          gitops_gh_token: ${{ secrets.GITOPS_DEPLOY_TOKEN }}
          image_name: unified-scheduling-web
          new_image: ${{ env.GITHUB_IMAGE_REPO }}/${{ env.WEB_IMAGE_NAME }}:${{ needs.build.outputs.short_sha }}
          kustomize_path: services/unified-scheduling/overlays/dev
