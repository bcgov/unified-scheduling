# For details on how this file works refer to:
#   - https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns: ["*"]

  # Docker
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-root:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /docker/api
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-api:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /docker/web
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-web:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /docker/vue-on-nginx
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-vue-on-nginx:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /docker/nginx-runtime
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-nginx-runtime:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-devcontainer:
        patterns: ["*"]

  # Dev Container features
  # directory is the repo root; Dependabot discovers .devcontainer/devcontainer.json
  # (any valid dev container location) relative to it.
  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
      day: monday

  # NuGet
  # Minor + patch grouped into one PR; each major gets its own PR for deliberate review.
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      nuget-minor-patch:
        update-types: ["minor", "patch"]
    # Caps total open version-update PRs for this ecosystem (grouped and individual alike)
    open-pull-requests-limit: 10

  # NPM
  # Minor + patch grouped into one PR; each major gets its own PR for deliberate review.
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-production-minor-patch:
        dependency-type: production
        update-types: ["minor", "patch"]
        patterns: ["*"]
      npm-development-minor-patch:
        dependency-type: development
        update-types: ["minor", "patch"]
        patterns: ["*"]
    # Caps total open version-update PRs for this ecosystem (grouped and individual alike)
    open-pull-requests-limit: 10
